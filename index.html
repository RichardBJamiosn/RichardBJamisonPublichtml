<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Richard B. Jamison — Online Portfolio">
  <meta name="author" content="Richard B Jamison">
  <meta name="keywords" content="Richard Jamison, Richard B Jamison, marketing, commercial real estate, web design, SEO, drums, drummer, trumpet, musician">
  <title>Richard B. Jamison</title>
  <link rel="icon" href="img/ico/favicon.ico">
    <!-- Google tag (gtag.js) - GA4 -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-7748LM48YW"></script>
    <script>
          window.dataLayer = window.dataLayer || [];
          function gtag(){dataLayer.push(arguments);}
          gtag('js', new Date());
          gtag('config', 'G-7748LM48YW');
    </script>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      width: 100%; height: 100%;
      background: #000;
      overflow: hidden;
    }

    /* ── Full-screen background video ── */
    #bg-video {
      position: fixed;
      top: 50%; left: 50%;
      transform: translate(-50%, -44%);
      min-width: 100vw;
      min-height: 100vh;
      width: auto; height: auto;
      object-fit: cover;
      z-index: 1;
      clip-path: inset(0 0 5% 0);
    }

    /* ── Sign link hotspots ── */
    /*
      Positioned over the three words on the hanging sign.
      Sign is center-left of the image, roughly 33–55% from left, 35–62% from top.
      Adjust top/left if any word is slightly off.
    */
    #sign-links {
      position: fixed;
      inset: 0;
      z-index: 5;
      pointer-events: none;
    }

    .sign-link {
      position: absolute;
      display: flex;
      align-items: center;
      justify-content: center;
      pointer-events: all;
      cursor: pointer;
      text-decoration: none;

      width: 10vw;
      min-width: 80px;
      height: 5vh;
      min-height: 24px;

      background: rgba(255, 255, 255, 0);
      border-radius: 4px;
      transition: background 0.2s, box-shadow 0.2s;

      font-family: Georgia, serif;
      font-size: clamp(0.8rem, 1.3vw, 1.1rem);
      color: rgba(255, 255, 255, 0);
      letter-spacing: 0.05em;
    }

    .sign-link:hover {
      background: rgba(255, 255, 255, 0.15);
      box-shadow: 0 0 0 2px rgba(255, 255, 255, 0.3);
      color: rgba(255, 255, 255, 0);
    }

    #link-bio {
      top: 52%;
      left: 56%;
      transform: translate(-50%, -50%);
    }
    #link-portfolio {
      top: 58%;
      left: 56%;
      transform: translate(-50%, -50%);
    }
    #link-music {
      top: 64%;
      left: 56%;
      transform: translate(-50%, -50%);
    }

    /* ── Fade-out transition ── */
    #fade {
      position: fixed;
      inset: 0;
      background: #000;
      opacity: 0;
      pointer-events: none;
      z-index: 20;
      transition: opacity 0.6s ease;
    }
    #fade.active { opacity: 1; }

    /* ── Mobile nav overlay ── */
    #mobile-nav {
      display: none;
      position: fixed;
      bottom: 0; left: 0; right: 0;
      z-index: 10;
      padding: 3rem 2rem 4rem;
      background: linear-gradient(to top, rgba(0,0,0,0.92) 0%, rgba(0,0,0,0.5) 70%, transparent 100%);
    }
    #mobile-nav a {
      display: block;
      text-align: center;
      font-family: Georgia, serif;
      font-size: 1.5rem;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.9);
      text-decoration: none;
      padding: 1rem 0;
      border-bottom: 1px solid rgba(255,255,255,0.15);
    }
    #mobile-nav a:last-child { border-bottom: none; }
    #mobile-nav a:active { color: #c8a96e; }

    @media (max-width: 768px) {
      #sign-links { display: none; }
      #mobile-nav { display: block; }
      #bg-video { object-position: 60% center; }
    }
  </style>
</head>
<body>

  <video id="bg-video" autoplay muted playsinline loop preload="auto" poster="img/home-bg.png">
    <source src="video/home.mp4" type="video/mp4">
  </video>

  <div id="sign-links">
    <a class="sign-link" id="link-bio"       href="marketing.html">Biography</a>
    <a class="sign-link" id="link-portfolio" href="rbj-portfolio.html">Portfolio</a>
    <a class="sign-link" id="link-music"     href="music.html">Music</a>
  </div>

  <!-- Mobile navigation overlay -->
  <div id="mobile-nav">
    <a href="marketing.html">Biography</a>
    <a href="rbj-portfolio.html">Portfolio</a>
    <a href="music.html">Music</a>
  </div>

  <div id="fade"></div>

  <script>
    const fade  = document.getElementById('fade');
    const video = document.getElementById('bg-video');

    video.addEventListener('loadedmetadata', () => { video.playbackRate = 0.44; });
    video.addEventListener('play', () => { video.playbackRate = 0.44; });

    // All nav links — fade to black and navigate
    document.querySelectorAll('.sign-link, #mobile-nav a').forEach(link => {
      link.addEventListener('click', e => {
        e.preventDefault();
        const dest = link.getAttribute('href');
        fade.classList.add('active');
        setTimeout(() => { window.location.href = dest; }, 650);
      });
    });
  </script>

</body>
</html>
