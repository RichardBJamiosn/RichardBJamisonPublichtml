<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Richard B. Jamison — Online Portfolio">
  <meta name="author" content="Richard B Jamison">
  <meta name="keywords" content="Richard Jamison, Richard B Jamison, marketing, commercial real estate, web design, SEO, drums, drummer, trumpet, musician">
  <title>Richard B. Jamison</title>
  <link rel="icon" href="img/ico/favicon.ico">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      width: 100%; height: 100%;
      background: #000;
      overflow: hidden;
    }

    /* ── Full-screen background video ── */
    #bg-video {
      position: fixed;
      top: 50%; left: 50%;
      transform: translate(-50%, -44%);
      min-width: 100vw;
      min-height: 100vh;
      width: auto; height: auto;
      object-fit: cover;
      z-index: 1;
      clip-path: inset(0 0 5% 0);
    }

    /* ── Sign link hotspots ── */
    /*
      Positioned over the three words on the hanging sign.
      Sign is center-left of the image, roughly 33–55% from left, 35–62% from top.
      Adjust top/left if any word is slightly off.
    */
    #sign-links {
      position: fixed;
      inset: 0;
      z-index: 5;
      pointer-events: none;
    }

    .sign-link {
      position: absolute;
      display: flex;
      align-items: center;
      justify-content: center;
      pointer-events: all;
      cursor: pointer;
      text-decoration: none;

      width: 10vw;
      min-width: 80px;
      height: 5vh;
      min-height: 24px;

      background: rgba(255, 255, 255, 0);
      border-radius: 4px;
      transition: background 0.2s, box-shadow 0.2s;

      font-family: Georgia, serif;
      font-size: clamp(0.8rem, 1.3vw, 1.1rem);
      color: rgba(255, 255, 255, 0);
      letter-spacing: 0.05em;
    }

    .sign-link:hover {
      background: rgba(255, 255, 255, 0.15);
      box-shadow: 0 0 0 2px rgba(255, 255, 255, 0.3);
      color: rgba(255, 255, 255, 0);
    }

    #link-bio {
      top: 52%;
      left: 56%;
      transform: translate(-50%, -50%);
    }
    #link-portfolio {
      top: 58%;
      left: 56%;
      transform: translate(-50%, -50%);
    }
    #link-music {
      top: 64%;
      left: 56%;
      transform: translate(-50%, -50%);
    }

    /* ── Fade-out transition ── */
    #fade {
      position: fixed;
      inset: 0;
      background: #000;
      opacity: 0;
      pointer-events: none;
      z-index: 20;
      transition: opacity 0.6s ease;
    }
    #fade.active { opacity: 1; }

    /* ── Responsive ── */
    @media (max-width: 600px) {
      .sign-link { width: 40vw; min-width: 100px; }
    }
  </style>
</head>
<body>

  <video id="bg-video" autoplay muted playsinline loop preload="auto">
    <source src="video/home.mp4" type="video/mp4">
  </video>

  <div id="sign-links">
    <a class="sign-link" id="link-bio"       href="marketing.html">Biography</a>
    <a class="sign-link" id="link-portfolio" href="rbj-portfolio.html">Portfolio</a>
    <a class="sign-link" id="link-music"     href="music.html">Music</a>
  </div>

  <div id="fade"></div>

  <script>
    const fade  = document.getElementById('fade');
    const video = document.getElementById('bg-video');

    video.addEventListener('loadedmetadata', () => { video.playbackRate = 0.44; });
    video.addEventListener('play', () => { video.playbackRate = 0.44; });

    // Sign word clicked — fade to black and navigate
    document.querySelectorAll('.sign-link').forEach(link => {
      link.addEventListener('click', e => {
        e.preventDefault();
        const dest = link.getAttribute('href');
        fade.classList.add('active');
        setTimeout(() => { window.location.href = dest; }, 650);
      });
    });
  </script>

</body>
</html>
